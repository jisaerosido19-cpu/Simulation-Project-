<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Shooter Game</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial;
    color: white;
}

/* SCORE */
#score {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 20px;
}

/* GAME OVER */
#gameOver {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    display: none;
}

/* START SCREEN */
#startScreen {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    background: black;
    z-index: 10;
}

button {
    padding: 12px 25px;
    font-size: 18px;
    cursor: pointer;
    border: none;
    border-radius: 8px;
}

.startBtn {
    background: limegreen;
    color: white;
    margin-top: 15px;
}

.restartBtn {
    background: crimson;
    color: white;
}
</style>
</head>

<body>

<div id="score">Score: 0</div>

<!-- START SCREEN -->
<div id="startScreen">
    <h1>Mini Shooter Game</h1>
    <button class="startBtn" onclick="startGame()">Start Game</button>
</div>

<!-- GAME OVER -->
<div id="gameOver">
    <h1>Game Over</h1>
    <button class="restartBtn" onclick="restart()">Restart</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// PLAYER
const player = {
    x: canvas.width / 2,
    y: canvas.height - 80,
    size: 20,
    color: "cyan"
};

// GAME STATE
let bullets = [];
let enemies = [];
let score = 0;
let gameRunning = false; // 👈 start as false

// CONTROLS
document.addEventListener("mousemove", (e) => {
    player.x = e.clientX;
});

document.addEventListener("click", () => {
    if (gameRunning) shoot();
});

// SHOOT
function shoot() {
    bullets.push({
        x: player.x,
        y: player.y,
        size: 5,
        speed: 7
    });
}

// SPAWN ENEMY
function spawnEnemy() {
    enemies.push({
        x: Math.random() * canvas.width,
        y: -20,
        size: 20,
        speed: 2 + Math.random() * 2
    });
}

// DRAW PLAYER
function drawPlayer() {
    ctx.fillStyle = player.color;
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
    ctx.fill();
}

// BULLETS
function drawBullets() {
    bullets.forEach((b, i) => {
        b.y -= b.speed;

        ctx.fillStyle = "yellow";
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
        ctx.fill();

        if (b.y < 0) bullets.splice(i, 1);
    });
}

// ENEMIES
function drawEnemies() {
    enemies.forEach((e, ei) => {
        e.y += e.speed;

        ctx.fillStyle = "red";
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
        ctx.fill();

        if (e.y > canvas.height) {
            gameOver();
        }

        bullets.forEach((b, bi) => {
            const dx = e.x - b.x;
            const dy = e.y - b.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < e.size + b.size) {
                enemies.splice(ei, 1);
                bullets.splice(bi, 1);
                score++;
                updateScore();
            }
        });
    });
}

// SCORE
function updateScore() {
    document.getElementById("score").innerText = "Score: " + score;
}

// GAME LOOP
function gameLoop() {
    if (!gameRunning) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawPlayer();
    drawBullets();
    drawEnemies();

    requestAnimationFrame(gameLoop);
}

// START GAME
function startGame() {
    document.getElementById("startScreen").style.display = "none";
    gameRunning = true;
    gameLoop();
}

// SPAWN LOOP
setInterval(() => {
    if (gameRunning) spawnEnemy();
}, 1000);

// GAME OVER
function gameOver() {
    gameRunning = false;
    document.getElementById("gameOver").style.display = "block";
}

// RESTART
function restart() {
    bullets = [];
    enemies = [];
    score = 0;
    gameRunning = true;

    updateScore();
    document.getElementById("gameOver").style.display = "none";
    gameLoop();
}
</script>
    <script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// PLAYER
const player = {
    x: canvas.width / 2,
    y: canvas.height - 80,
    size: 20,
    color: "cyan",
    speed: 12 // ⚡ FASTER MOVEMENT
};

// GAME STATE
let bullets = [];
let enemies = [];
let score = 0;
let gameRunning = false;

// CONTROLS
let mouseX = player.x;

document.addEventListener("mousemove", (e) => {
    mouseX = e.clientX;
});

document.addEventListener("click", () => {
    if (gameRunning) shoot();
});

// SHOOT (FASTER + MORE RESPONSIVE)
function shoot() {
    bullets.push({
        x: player.x,
        y: player.y,
        size: 5,
        speed: 12 // ⚡ FASTER BULLETS
    });
}

// ENEMY SPAWN SPEED CONTROL
let spawnRate = 1000;

// SPAWN ENEMY
function spawnEnemy() {
    enemies.push({
        x: Math.random() * canvas.width,
        y: -20,
        size: 20,
        speed: 2 + Math.random() * 3
    });
}

// PLAYER DRAW + SMOOTH FOLLOW
function drawPlayer() {
    // smooth movement (NOT instant teleport)
    player.x += (mouseX - player.x) * 0.2;

    ctx.fillStyle = player.color;
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
    ctx.fill();
}

// BULLETS
function drawBullets() {
    bullets.forEach((b, i) => {
        b.y -= b.speed;

        ctx.fillStyle = "yellow";
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
        ctx.fill();

        if (b.y < 0) bullets.splice(i, 1);
    });
}

// ENEMIES
function drawEnemies() {
    enemies.forEach((e, ei) => {
        e.y += e.speed;

        ctx.fillStyle = "red";
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
        ctx.fill();

        if (e.y > canvas.height) gameOver();

        bullets.forEach((b, bi) => {
            const dx = e.x - b.x;
            const dy = e.y - b.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < e.size + b.size) {
                enemies.splice(ei, 1);
                bullets.splice(bi, 1);
                score++;
                updateScore();

                // ⚡ DIFFICULTY INCREASE (GAME GETS FASTER)
                if (score % 5 === 0 && spawnRate > 400) {
                    spawnRate -= 50;
                    restartSpawnLoop();
                }
            }
        });
    });
}

// SCORE
function updateScore() {
    document.getElementById("score").innerText = "Score: " + score;
}

// GAME LOOP (SMOOTH 60 FPS)
function gameLoop() {
    if (!gameRunning) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawPlayer();
    drawBullets();
    drawEnemies();

    requestAnimationFrame(gameLoop);
}

// START GAME
function startGame() {
    document.getElementById("startScreen").style.display = "none";
    gameRunning = true;
    gameLoop();
    restartSpawnLoop();
}

// SPAWN LOOP (DYNAMIC SPEED)
let spawnInterval;

function restartSpawnLoop() {
    clearInterval(spawnInterval);
    spawnInterval = setInterval(() => {
        if (gameRunning) spawnEnemy();
    }, spawnRate);
}

// GAME OVER
function gameOver() {
    gameRunning = false;
    document.getElementById("gameOver").style.display = "block";
}

// RESTART
function restart() {
    bullets = [];
    enemies = [];
    score = 0;
    spawnRate = 1000;

    gameRunning = true;
    updateScore();

    document.getElementById("gameOver").style.display = "none";

    restartSpawnLoop();
    gameLoop();
}
</script>

</body>
</html>
